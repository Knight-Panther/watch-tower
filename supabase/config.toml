# Watch Tower - Supabase Local Dev Configuration
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "watch-tower"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Disable services we don't need
[auth]
enabled = false

[storage]
enabled = false

[realtime]
enabled = false

[inbucket]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
