upstream api {
    server api:3001;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    # ── Temporary HTTP config (before SSL) ────────────────────────────────────
    # Remove this entire block and uncomment the redirect above after certbot

    # Health check — no auth required (for uptime monitoring)
    location = /api/health {
        proxy_pass http://api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API proxy
    location /api/ {
        auth_basic "Watch Tower";
        auth_basic_user_file /etc/nginx/.htpasswd;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=api_limit burst=50 nodelay;
    }

    # SSE endpoint — longer timeouts, no buffering
    location = /api/events {
        auth_basic "Watch Tower";
        auth_basic_user_file /etc/nginx/.htpasswd;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Frontend (SPA)
    location / {
        auth_basic "Watch Tower";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}

